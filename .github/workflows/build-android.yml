name: Build Android AAB

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - 'claude/plan-app-improvements-u3lXt'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - run: npm ci --legacy-peer-deps

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=AIzaSyAeEHqEKubTYTZboROg71VOYq_1WqoRjck
          VITE_FIREBASE_AUTH_DOMAIN=horamed-firebase.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=horamed-firebase
          VITE_FIREBASE_STORAGE_BUCKET=horamed-firebase.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=299174581868
          VITE_FIREBASE_APP_ID=1:299174581868:web:8f12e40d915f5d9e956a49
          VITE_FIREBASE_MEASUREMENT_ID=G-4JLQ2SGXSE
          EOF

      - run: npm run build

      - run: npx cap sync android

      - name: Build AAB
        working-directory: android
        env:
          HORAMED_KEYSTORE_PASSWORD: "Gringo08!"
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
