name: Deploy — Hosting + Functions + AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/plan-app-improvements-u3lXt'
    tags:
      - 'v*'

jobs:
  # ─────────────────────────────────────────────
  # 1. Firebase Hosting + Cloud Functions deploy
  # ─────────────────────────────────────────────
  firebase:
    name: Firebase Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true  # skips gracefully until FIREBASE_TOKEN secret is configured

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=AIzaSyAeEHqEKubTYTZboROg71VOYq_1WqoRjck
          VITE_FIREBASE_AUTH_DOMAIN=horamed-firebase.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=horamed-firebase
          VITE_FIREBASE_STORAGE_BUCKET=horamed-firebase.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=299174581868
          VITE_FIREBASE_APP_ID=1:299174581868:web:8f12e40d915f5d9e956a49
          VITE_FIREBASE_MEASUREMENT_ID=G-4JLQ2SGXSE
          EOF

      - name: Install frontend deps
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Install Functions deps
        run: npm ci --legacy-peer-deps
        working-directory: functions

      - name: Build Functions
        run: npm run build
        working-directory: functions

      - name: Check FIREBASE_TOKEN secret
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "⚠️  FIREBASE_TOKEN secret not set."
            echo "Add it at: https://github.com/leplonghi/Horamed-AG/settings/secrets/actions"
            echo "Run on your machine: npx firebase-tools login:ci"
            exit 1
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions --non-interactive --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # ─────────────────────────────────────────────
  # 2. Android AAB build (only on tags or main)
  # ─────────────────────────────────────────────
  android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=AIzaSyAeEHqEKubTYTZboROg71VOYq_1WqoRjck
          VITE_FIREBASE_AUTH_DOMAIN=horamed-firebase.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=horamed-firebase
          VITE_FIREBASE_STORAGE_BUCKET=horamed-firebase.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=299174581868
          VITE_FIREBASE_APP_ID=1:299174581868:web:8f12e40d915f5d9e956a49
          VITE_FIREBASE_MEASUREMENT_ID=G-4JLQ2SGXSE
          EOF

      - run: npm ci --legacy-peer-deps

      - run: npm run build

      - run: npx cap sync android

      - name: Build AAB
        working-directory: android
        env:
          HORAMED_KEYSTORE_PASSWORD: "Gringo08!"
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
